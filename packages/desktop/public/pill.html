<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=120, height=32">
  <title>Recording</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 120px;
      height: 32px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 120px;
      height: 32px;
      padding: 0 14px;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }

    /* ── LISTENING STATE: minimal waveform ───────────────── */
    .bars {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
    }

    .bar {
      width: 2px;
      background: linear-gradient(180deg, #f8fafc 0%, #94a3b8 100%);
      border-radius: 1px;
      animation: wave 1s ease-in-out infinite;
    }

    .bar:nth-child(1)  { height: 6px;  animation-delay: 0s; }
    .bar:nth-child(2)  { height: 10px; animation-delay: 0.08s; }
    .bar:nth-child(3)  { height: 14px; animation-delay: 0.16s; }
    .bar:nth-child(4)  { height: 8px;  animation-delay: 0.24s; }
    .bar:nth-child(5)  { height: 12px; animation-delay: 0.32s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); opacity: 0.7; }
      50%      { transform: scaleY(0.4); opacity: 1; }
    }

    /* ── PROCESSING STATE: minimal dots ──────────────────── */
    .dots {
      display: none;
      align-items: center;
      gap: 3px;
      height: 16px;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: #f8fafc;
      border-radius: 50%;
      animation: bounce 0.8s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.1s; }
    .dot:nth-child(3) { animation-delay: 0.2s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.4; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── REC indicator ───────────────────────────────────── */
    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: 0.5px;
    }

    .rec-dot {
      width: 5px;
      height: 5px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    /* State toggling */
    body.processing .bars { display: none; }
    body.processing .dots { display: flex; }
  </style>
</head>
<body>
  <div class="pill">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="rec-indicator">
      <div class="rec-dot"></div>
      <span>REC</span>
    </div>
  </div>
  <script>
    // Listen for state changes from the Tauri backend
    function setupListeners() {
      const tauriEvent = window.__TAURI__ && window.__TAURI__.event;
      if (!tauriEvent) {
        // Retry — Tauri injects the global after DOMContentLoaded in some cases
        setTimeout(setupListeners, 50);
        return;
      }
      tauriEvent.listen("pill-set-processing", () => {
        document.body.classList.add("processing");
      });
      tauriEvent.listen("pill-set-listening", () => {
        document.body.classList.remove("processing");
      });
    }
    setupListeners();
  </script>
</body>
</html>
