<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=200, height=44">
  <title>Recording</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100px;
      height: 20px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 200px;
      height: 44px;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── LISTENING STATE: waveform bars ──────────────────── */
    .bars {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
    }

    .bar {
      width: 3px;
      background: #f1f5f9;
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .bar:nth-child(1)  { height: 8px;  animation-delay: 0s; }
    .bar:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
    .bar:nth-child(3)  { height: 20px; animation-delay: 0.2s; }
    .bar:nth-child(4)  { height: 16px; animation-delay: 0.3s; }
    .bar:nth-child(5)  { height: 22px; animation-delay: 0.15s; }
    .bar:nth-child(6)  { height: 12px; animation-delay: 0.25s; }
    .bar:nth-child(7)  { height: 18px; animation-delay: 0.05s; }
    .bar:nth-child(8)  { height: 10px; animation-delay: 0.35s; }
    .bar:nth-child(9)  { height: 20px; animation-delay: 0.12s; }
    .bar:nth-child(10) { height: 14px; animation-delay: 0.28s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50%      { transform: scaleY(0.35); }
    }

    /* ── PROCESSING STATE: bouncing dots ────────────────── */
    .dots {
      display: none;
      align-items: center;
      gap: 5px;
      height: 24px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #f1f5f9;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1)  { animation-delay: 0s; }
    .dot:nth-child(2)  { animation-delay: 0.1s; }
    .dot:nth-child(3)  { animation-delay: 0.2s; }
    .dot:nth-child(4)  { animation-delay: 0.3s; }
    .dot:nth-child(5)  { animation-delay: 0.4s; }
    .dot:nth-child(6)  { animation-delay: 0.5s; }
    .dot:nth-child(7)  { animation-delay: 0.6s; }
    .dot:nth-child(8)  { animation-delay: 0.7s; }
    .dot:nth-child(9)  { animation-delay: 0.8s; }
    .dot:nth-child(10) { animation-delay: 0.9s; }

    @keyframes bounce {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30%           { opacity: 1;   transform: scale(1.1); }
    }

    /* State toggling */
    body.processing .bars { display: none; }
    body.processing .dots { display: flex; }
  </style>
</head>
<body>
  <div class="pill">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    // Listen for state changes from the Tauri backend
    function setupListeners() {
      const tauriEvent = window.__TAURI__ && window.__TAURI__.event;
      if (!tauriEvent) {
        // Retry — Tauri injects the global after DOMContentLoaded in some cases
        setTimeout(setupListeners, 50);
        return;
      }
      tauriEvent.listen("pill-set-processing", () => {
        document.body.classList.add("processing");
      });
      tauriEvent.listen("pill-set-listening", () => {
        document.body.classList.remove("processing");
      });
    }
    setupListeners();
  </script>
</body>
</html>
