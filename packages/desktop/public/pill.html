<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Figtree', sans-serif; }

    html, body {
      width: 160px;
      height: 36px;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      height: 28px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.92);
      border: none;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    }

    /* ── Red dot (left) ── */
    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(239,68,68,0.8);
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 6px rgba(239,68,68,0.8); }
      50%       { opacity: 0.5; box-shadow: 0 0 2px rgba(239,68,68,0.3); }
    }

    /* ── Wave bars (right) ── */
    .wave {
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 20px;
    }
    .wave span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: #06b6d4;
      animation: bar-wave 1.1s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .wave span:nth-child(1) { animation-delay: 0.0s; }
    .wave span:nth-child(2) { animation-delay: 0.15s; }
    .wave span:nth-child(3) { animation-delay: 0.3s; }
    .wave span:nth-child(4) { animation-delay: 0.15s; }
    .wave span:nth-child(5) { animation-delay: 0.0s; }
    @keyframes bar-wave {
      0%, 100% { height: 4px;  opacity: 0.4; }
      50%       { height: 18px; opacity: 1;   }
    }
  </style>
</head>
<body>
  <div class="pill">
    <div class="rec-dot"></div>
    <div class="wave">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</body>
</html>
