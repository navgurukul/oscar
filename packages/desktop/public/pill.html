<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=72, height=26">
  <title>Recording</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 72px;
      height: 26px;
      overflow: hidden;
      background: transparent;
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 26px;
      background: rgba(15, 23, 42, 0.92);
      border-radius: 13px;
      border: 1.5px solid rgba(6, 182, 212, 0.6);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 8px rgba(6, 182, 212, 0.2);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }

    /* ── LISTENING STATE: equalizer bars ─── */
    .listening-state {
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 14px;
    }

    .bar {
      width: 3px;
      background: #f8fafc;
      border-radius: 2px;
      animation: eq 0.9s ease-in-out infinite;
    }

    .bar:nth-child(1)  { height: 4px;  animation-delay: 0.0s; }
    .bar:nth-child(2)  { height: 8px;  animation-delay: 0.1s; }
    .bar:nth-child(3)  { height: 14px; animation-delay: 0.2s; }
    .bar:nth-child(4)  { height: 7px;  animation-delay: 0.3s; }
    .bar:nth-child(5)  { height: 12px; animation-delay: 0.15s; }
    .bar:nth-child(6)  { height: 5px;  animation-delay: 0.25s; }
    .bar:nth-child(7)  { height: 10px; animation-delay: 0.05s; }
    .bar:nth-child(8)  { height: 4px;  animation-delay: 0.35s; }

    @keyframes eq {
      0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
      50%       { transform: scaleY(1);   opacity: 1; }
    }

    /* ── PROCESSING STATE: spinner ──────────────── */
    .processing-state {
      display: none;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(6, 182, 212, 0) 0%,
        rgba(6, 182, 212, 0.4) 40%,
        #06B6D4 100%
      );
      -webkit-mask: radial-gradient(circle, transparent 4px, black 5px);
      mask: radial-gradient(circle, transparent 4px, black 5px);
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 6px rgba(6, 182, 212, 0.5);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* State toggling */
    body.processing .listening-state { display: none; }
    body.processing .processing-state { display: flex; }
  </style>
</head>
<body>
  <div class="pill">
    <div class="listening-state">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="processing-state">
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
