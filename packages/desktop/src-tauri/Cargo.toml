[package]
name = "oscar"
version = "0.7.17"
description = "Voice to Text Desktop App"
authors = ["you"]
edition = "2021"

[lib]
name = "oscar_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = []
cuda   = ["whisper-rs/cuda"]
vulkan = ["whisper-rs/vulkan"]
silero-vad = ["dep:voice_activity_detector"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "devtools", "tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-store = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
tauri-plugin-log = "2"
arboard = "3"
enigo = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1", features = ["fs", "io-util", "time"] }
futures-util = "0.3"
symphonia = { version = "0.5", features = ["aac", "isomp4", "mkv", "pcm"] }
rubato = "0.16"
base64 = "0.22"
opus = "0.3"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
sha2 = "0.10"
num_cpus = "1.16"
voice_activity_detector = { version = "0.2", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_UI_WindowsAndMessaging", "Win32_Foundation", "Win32_System_Threading"] }
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Media_Audio",
    "Win32_System_Com",
] }
# Used to intercept WebView2's microphone-permission popup so users don't see
# the "tauri.localhost wants to use your microphone" Edge dialog — the in-app
# onboarding screen is the source of truth instead.
webview2-com = "0.38"
whisper-rs = "0.15"

[target.'cfg(target_os = "linux")'.dependencies]
whisper-rs = "0.15"

[target.'cfg(target_os = "macos")'.dependencies]
whisper-rs = { version = "0.15", features = ["metal"] }
core-graphics = "0.24"

[profile.release]
strip = true
lto = true
codegen-units = 1
