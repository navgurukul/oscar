[package]
name = "oscar"
version = "0.3.26"
description = "Voice to Text Desktop App"
authors = ["you"]
edition = "2021"

[lib]
name = "oscar_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "devtools", "tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-store = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
arboard = "3"
enigo = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1", features = ["fs", "io-util"] }
futures-util = "0.3"
symphonia = { version = "0.5", features = ["aac", "isomp4", "mkv", "pcm"] }
rubato = "0.16"
base64 = "0.22"
opus = "0.3"

[target.'cfg(target_os = "windows")'.dependencies]
# Win32 paste-target fix (GetForegroundWindow / SetForegroundWindow)
windows-sys = { version = "0.52", features = ["Win32_UI_WindowsAndMessaging", "Win32_Foundation"] }
# WASAPI loopback capture for system audio
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Media_Audio",
    "Win32_System_Com",
] }
# Whisper with CUDA GPU acceleration (requires CUDA toolkit; drop "cuda" for CPU-only)
whisper-rs = { version = "0.15", features = ["cuda"] }

[target.'cfg(target_os = "linux")'.dependencies]
# CPU-only whisper; add features = ["vulkan"] with the Vulkan SDK for GPU accel
whisper-rs = "0.15"

[target.'cfg(target_os = "macos")'.dependencies]
whisper-rs = { version = "0.15", features = ["metal"] }
core-graphics = "0.24"

[profile.release]
strip = true
lto = true
codegen-units = 1
