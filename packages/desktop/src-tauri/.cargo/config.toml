# macOS 26 (darwin25) fix: libc++ headers live inside the SDK,
# not in the CommandLineTools usr/include path that clang searches by default.
[env]
CXXFLAGS = { value = "-I/Library/Developer/CommandLineTools/SDKs/MacOSX26.2.sdk/usr/include/c++/v1", force = false }
PKG_CONFIG_PATH = { value = "/opt/homebrew/lib/pkgconfig", force = false }
# CMake 4.x compatibility: allow whisper.cpp's cmake_minimum_required(VERSION 3.5) without error
CMAKE_POLICY_VERSION_MINIMUM = { value = "3.5", force = false }

# Metal framework linking for whisper-rs ggml-metal backend
# Required for ___isPlatformVersionAtLeast symbol resolution on ARM64
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=11.0",
    "-l", "framework=Metal",
    "-l", "framework=Foundation",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=11.0",
    "-l", "framework=Metal",
    "-l", "framework=Foundation",
]
