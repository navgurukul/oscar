name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin      # Apple Silicon
          - os: macos-latest
            target: x86_64-apple-darwin       # Intel Mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OSCAR ${{ github.ref_name }}'
          releaseBody: |
            See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # After both mac builds finish, create the updates.json manifest
  updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets and build updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Building updates.json for version $VERSION"

          # Fetch the release JSON to get asset URLs and signatures
          RELEASE=$(gh release view "$TAG" --json assets,body --repo ${{ github.repository }})

          # Helper: get URL for an asset by pattern
          get_url() { echo "$RELEASE" | jq -r ".assets[] | select(.name | test(\"$1\")) | .browserDownloadUrl" | head -1; }
          get_sig() {
            SIG_URL=$(echo "$RELEASE" | jq -r ".assets[] | select(.name | test(\"$1\")) | .browserDownloadUrl" | head -1)
            curl -sL "$SIG_URL"
          }

          ARM_URL=$(get_url "aarch64.*\\.dmg$")
          X86_URL=$(get_url "x86_64.*\\.dmg$")
          ARM_SIG=$(get_sig "aarch64.*\\.dmg\\.sig$")
          X86_SIG=$(get_sig "x86_64.*\\.dmg\\.sig$")

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > updates.json << EOF
          {
            "version": "$VERSION",
            "notes": "Bug fixes and improvements.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$ARM_SIG",
                "url": "$ARM_URL"
              },
              "darwin-x86_64": {
                "signature": "$X86_SIG",
                "url": "$X86_URL"
              }
            }
          }
          EOF

          echo "updates.json:"
          cat updates.json

          # Upload updates.json to the release
          gh release upload "$TAG" updates.json --clobber --repo ${{ github.repository }}
