name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon (M1/M2) — native aarch64
            target: aarch64-apple-darwin
          - os: macos-13          # Intel — native x86_64
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OSCAR ${{ github.ref_name }}'
          releaseBody: 'Bug fixes and improvements. Download the .dmg for your Mac below.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # After both builds finish, generate and upload updates.json
  updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fetch all assets for this release
          ASSETS=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          get_url() {
            echo "$ASSETS" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          pattern = sys.argv[1]
          assets = data.get('assets', [])
          for a in assets:
              if re.search(pattern, a['name']):
                  print(a['browser_download_url'])
                  break
          " "$1"
          }

          get_sig() {
            SIG_URL=$(get_url "$1")
            [ -n "$SIG_URL" ] && curl -sL "$SIG_URL" || echo ""
          }

          ARM_URL=$(get_url "aarch64.*\.dmg$")
          X86_URL=$(get_url "x86_64.*\.dmg$|x64.*\.dmg$")
          ARM_SIG=$(get_sig "aarch64.*\.dmg\.sig$")
          X86_SIG=$(get_sig "x86_64.*\.dmg\.sig$|x64.*\.dmg\.sig$")

          echo "ARM URL: $ARM_URL"
          echo "X86 URL: $X86_URL"

          python3 - <<PYEOF
          import json
          data = {
            "version": "$VERSION",
            "notes": "Bug fixes and improvements.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": """$ARM_SIG""".strip(),
                "url": "$ARM_URL"
              },
              "darwin-x86_64": {
                "signature": """$X86_SIG""".strip(),
                "url": "$X86_URL"
              }
            }
          }
          print(json.dumps(data, indent=2))
          PYEOF > updates.json

          cat updates.json

      - name: Upload updates.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          # Delete old updates.json if exists, then upload fresh one
          ASSET_ID=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); print(next((str(a['id']) for a in assets if a['name']=='updates.json'),''))")

          [ -n "$ASSET_ID" ] && curl -sL -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"

          UPLOAD_URL=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          curl -sL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @updates.json \
            "${UPLOAD_URL}?name=updates.json"
