name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-silicon
            # Pin to baseline ARMv8-A so whisper.cpp/ggml skips i8mm/dotprod
            # SIMD paths that clang rejects on GitHub Actions ARM runners.
            cflags: "-march=armv8-a"
          - target: x86_64-apple-darwin
            label: macos-intel
            cflags: ""

    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        working-directory: packages/desktop
        run: pnpm build

      - name: Build Tauri app
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_BACKTRACE: "1"
          CFLAGS: ${{ matrix.cflags }}
          CXXFLAGS: ${{ matrix.cflags }}
        # Build both dmg (for initial download) and app (for silent auto-update via .app.tar.gz)
        run: ../../node_modules/.bin/tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Sign bundles
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TARGET: ${{ matrix.target }}
        run: |
          sign_file() {
            local FILE="$1"
            [ -f "$FILE" ] || return
            echo "Signing $FILE..."
            ../../node_modules/.bin/tauri signer sign "$FILE" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"}
            echo "→ $(basename "$FILE").sig"
          }
          # Sign the .app.tar.gz (used by auto-updater for silent install)
          for F in src-tauri/target/$TARGET/release/bundle/macos/*.app.tar.gz; do sign_file "$F"; done
          # Sign the .dmg (used for initial download page)
          for F in src-tauri/target/$TARGET/release/bundle/dmg/*.dmg; do sign_file "$F"; done

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          REPO: ${{ github.repository }}
        run: |
          # Create or get the release
          RELEASE=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          RELEASE_ID=$(echo "$RELEASE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -sL -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"OSCAR $TAG\",\"body\":\"Bug fixes and improvements.\",\"draft\":false,\"prerelease\":false}" \
              "https://api.github.com/repos/$REPO/releases" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          fi

          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"

          upload_file() {
            local FILE="$1"
            [ -f "$FILE" ] || return
            local NAME=$(basename "$FILE")
            echo "Uploading $NAME..."
            curl -sL -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$FILE" \
              "$UPLOAD_URL?name=$NAME"
          }
          BASE="packages/desktop/src-tauri/target/$TARGET/release/bundle"
          # Upload .app.tar.gz + .sig (for auto-updater)
          for F in "$BASE"/macos/*.app.tar.gz "$BASE"/macos/*.app.tar.gz.sig; do upload_file "$F"; done
          # Upload .dmg + .sig (for download page)
          for F in "$BASE"/dmg/*.dmg "$BASE"/dmg/*.dmg.sig; do upload_file "$F"; done

  # After both builds, generate updates.json with real signatures
  updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate and upload updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ASSETS=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          get_url() {
            echo "$ASSETS" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if re.search(sys.argv[1], a['name']):
                  print(a['browser_download_url']); break
          " "$1"
          }

          get_sig() {
            URL=$(get_url "$1")
            [ -n "$URL" ] && curl -sL "$URL" || echo ""
          }

          # Use .app.tar.gz for auto-updater (supports silent install on macOS)
          ARM_URL=$(get_url "aarch64.*\.app\.tar\.gz$")
          X86_URL=$(get_url "x64.*\.app\.tar\.gz$|x86_64.*\.app\.tar\.gz$")
          ARM_SIG=$(get_sig "aarch64.*\.app\.tar\.gz\.sig$")
          X86_SIG=$(get_sig "x64.*\.app\.tar\.gz\.sig$|x86_64.*\.app\.tar\.gz\.sig$")

          echo "ARM: $ARM_URL"
          echo "X86: $X86_URL"

          python3 -c "
          import json
          print(json.dumps({
            'version': '$VERSION',
            'notes': 'Bug fixes and improvements.',
            'pub_date': '$PUB_DATE',
            'platforms': {
              'darwin-aarch64': {'signature': r'''$ARM_SIG'''.strip(), 'url': '$ARM_URL'},
              'darwin-x86_64':  {'signature': r'''$X86_SIG'''.strip(), 'url': '$X86_URL'},
            }
          }, indent=2))
          " > updates.json

          cat updates.json

          # Delete old updates.json if exists
          OLD_ID=$(echo "$ASSETS" | python3 -c "
          import sys,json
          for a in json.load(sys.stdin).get('assets',[]):
              if a['name']=='updates.json': print(a['id']); break
          " 2>/dev/null)
          [ -n "$OLD_ID" ] && curl -sL -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/assets/$OLD_ID"

          # Upload fresh updates.json
          RELEASE_ID=$(echo "$ASSETS" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @updates.json \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=updates.json"
