name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Create the GitHub release once, before the parallel matrix builds start.
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Tag must be in format vMAJOR.MINOR.PATCH (e.g., v0.2.13)"
            exit 1
          fi
          echo "Tag format valid: $TAG"

      # Full history + tags so git-cliff can diff this tag against the previous one.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Create GitHub Release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          EXISTING=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          RELEASE_ID=$(echo "$EXISTING" | jq -r '.id // empty')
          EXISTING_BODY=$(echo "$EXISTING" | jq -r '.body // empty')

          # Manual override: if a release already exists WITH a body (pre-created
          # or hand-edited on GitHub), keep it untouched.
          if [ -n "$RELEASE_ID" ] && [ -n "$EXISTING_BODY" ]; then
            echo "Release already has a body — keeping it (manual override)."
            echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Default: generate notes from conventional commits since the last tag.
          NOTES=$(git cliff --latest --config cliff.toml 2>/dev/null || true)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="Bug fixes and improvements."
          fi

          if [ -n "$RELEASE_ID" ]; then
            jq -n --arg b "$NOTES" '{body: $b}' | curl -sL -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- "https://api.github.com/repos/$REPO/releases/$RELEASE_ID" >/dev/null
            echo "Patched existing release body with generated notes."
          else
            RELEASE_ID=$(jq -n \
              --arg tag "$TAG" --arg name "OSCAR $TAG" --arg body "$NOTES" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}' \
              | curl -sL -X POST \
                  -H "Authorization: Bearer $GITHUB_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @- "https://api.github.com/repos/$REPO/releases" \
              | jq -r '.id')
            echo "Created release with generated notes."
          fi

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "Release ID: $RELEASE_ID"
          echo "----- generated notes -----"
          printf '%s\n' "$NOTES"

  release:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──
          # Pinned to macos-14 (Sonoma): macos-latest moved to Sequoia, which
          # breaks Tauri's bundle_dmg.sh (osascript/Finder API change).
          - target: aarch64-apple-darwin
            label: macos-silicon
            os: macos-14
            cflags: "-march=armv8-a -mmacosx-version-min=12.0"
            macosx_deployment_target: "12.0"
            bundles: "app"
            extra_cargo_args: ""
          - target: x86_64-apple-darwin
            label: macos-intel
            os: macos-14
            cflags: "-mmacosx-version-min=12.0"
            macosx_deployment_target: "12.0"
            bundles: "app"
            extra_cargo_args: ""
          # ── Windows ──
          # Vulkan compute backend was reverted in v0.5.26: whisper.cpp's
          # ggml-vulkan uses CMake ExternalProject_Add to build the
          # vulkan-shaders-gen helper, and that sub-build does not inherit
          # cl.exe / INCLUDE / LIB from the parent cargo build regardless of
          # job-scope MSVC env activation. Tracked separately; CPU + CUDA
          # paths still work on Windows.
          - target: x86_64-pc-windows-msvc
            label: windows-x64
            os: windows-latest
            cflags: ""
            macosx_deployment_target: ""
            bundles: "nsis"
            extra_cargo_args: ""
          # ── Linux ──
          - target: x86_64-unknown-linux-gnu
            label: linux-x64
            os: ubuntu-22.04
            cflags: ""
            macosx_deployment_target: ""
            bundles: "appimage,deb"
            extra_cargo_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version from tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${TAG#v}"

          echo "Injecting version: $VERSION"

          # Validate version format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version format '$VERSION'. Expected MAJOR.MINOR.PATCH"
            exit 1
          fi

          # Update package.json files
          for FILE in package.json packages/desktop/package.json; do
            if [ -f "$FILE" ]; then
              if command -v jq &> /dev/null; then
                jq --arg v "$VERSION" '.version = $v' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"
              else
                sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"$VERSION\"/" "$FILE"
              fi
              echo "Updated $FILE: $(grep '"version"' "$FILE")"
            fi
          done

          # Update tauri.conf.json
          FILE="packages/desktop/src-tauri/tauri.conf.json"
          if [ -f "$FILE" ]; then
            if command -v jq &> /dev/null; then
              jq --arg v "$VERSION" '.version = $v' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"
            else
              sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"$VERSION\"/" "$FILE"
            fi
            echo "Updated $FILE: $(grep '"version"' "$FILE")"
          fi

          # Update Cargo.toml [package] version. jq can't edit TOML, and the in-app
          # version banner / PE FileVersion derive from CARGO_PKG_VERSION, so it must
          # match the tag. Replaces only the first line-anchored `version = ` (the
          # [package] one; dependency versions are inline like `foo = { version = }`).
          FILE="packages/desktop/src-tauri/Cargo.toml"
          if [ -f "$FILE" ]; then
            VERSION="$VERSION" perl -i -pe 'if (/^version = / && !$d) { s/^version = .*/version = "$ENV{VERSION}"/; $d=1 }' "$FILE"
            echo "Updated $FILE: $(grep -m1 '^version' "$FILE")"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libxdo-dev \
            libonig-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install oniguruma

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./packages/desktop/src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        working-directory: packages/desktop
        env:
          VITE_SUPABASE_URL: "https://gxioxrtbjwlyhqyvsjxw.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4aW94cnRiandseWhxeXZzanh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NzA1OTUsImV4cCI6MjA4NDA0NjU5NX0.kqOYYdEhGvPTnqlzDXp1XiFyE9d1HOLwQt33htyM3Lk"
          VITE_WEB_APP_URL: "https://oscar.samyarth.org"
        run: pnpm build

      - name: Build Tauri app
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_BACKTRACE: "1"
          CFLAGS: ${{ matrix.cflags }}
          CXXFLAGS: ${{ matrix.cflags }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
          VITE_SUPABASE_URL: "https://gxioxrtbjwlyhqyvsjxw.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4aW94cnRiandseWhxeXZzanh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NzA1OTUsImV4cCI6MjA4NDA0NjU5NX0.kqOYYdEhGvPTnqlzDXp1XiFyE9d1HOLwQt33htyM3Lk"
          VITE_WEB_APP_URL: "https://oscar.samyarth.org"
        run: ../../node_modules/.bin/tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} ${{ matrix.extra_cargo_args }}

      # Re-seal the macOS .app and rebuild the .app.tar.gz updater artifact from
      # the re-signed bundle. `tauri build` without an Apple identity leaves the
      # .app only linker-signed (Contents/MacOS/oscar) with NO valid bundle-level
      # _CodeSignature/CodeResources seal. macOS 15/26+ launches such a bundle
      # DEGRADED (NSApplication runs, but the recording-pill window + tray never
      # initialise and TCC grants are dropped) — this is exactly what broke on a
      # user's Mac after the v0.7.32 auto-update.
      #
      # Two modes, both empty-secret-safe (the bash tests the vars, so unset
      # secrets simply select ad-hoc):
      #   • ad-hoc (default, FREE, no Apple account) — `codesign -s -` produces a
      #     valid seal. Launches fully; first DMG install needs a one-time
      #     Gatekeeper bypass and TCC grants reset each update (ad-hoc cdhash
      #     changes per build).
      #   • Developer ID (set APPLE_SIGNING_IDENTITY + APPLE_CERTIFICATE[_PASSWORD]
      #     repo secrets) — stable identity so TCC persists across updates.
      #     NOTE: Gatekeeper-frictionless installs ALSO need notarization
      #     (`xcrun notarytool` + `stapler`) which requires a paid account; wire
      #     that here once available. Until then both modes still need the
      #     one-time first-install bypass.
      - name: Sign & repackage macOS bundle
        if: runner.os == 'macOS'
        working-directory: packages/desktop
        env:
          TARGET: ${{ matrix.target }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          BASE="src-tauri/target/$TARGET/release/bundle"
          APP=$(find "$BASE/macos" -maxdepth 1 -name "*.app" -type d | head -n 1)
          [ -n "$APP" ] || { echo "No .app bundle found in $BASE/macos" >&2; exit 1; }
          APP_NAME=$(basename "$APP")

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ -n "${APPLE_CERTIFICATE:-}" ]; then
            echo "── Developer ID signing as: $APPLE_SIGNING_IDENTITY ──"
            KEYCHAIN="$RUNNER_TEMP/oscar-signing.keychain-db"
            KEYCHAIN_PW="$(uuidgen)"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -P "${APPLE_CERTIFICATE_PASSWORD:-}" \
              -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            security list-keychains -d user -s "$KEYCHAIN" \
              $(security list-keychains -d user | sed 's/[[:space:]"]//g')
            codesign --force --deep --timestamp --options runtime \
              --entitlements src-tauri/entitlements.plist \
              --sign "$APPLE_SIGNING_IDENTITY" "$APP"
            rm -f "$RUNNER_TEMP/cert.p12"
          else
            echo "── Ad-hoc signing (no Apple Developer account configured) ──"
            codesign --force --deep --sign - "$APP"
          fi

          echo "── Verify the bundle seal is valid ──"
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "── Rebuild .app.tar.gz so the updater artifact carries the new seal ──"
          TGZ=$(find "$BASE/macos" -maxdepth 1 -name "*.app.tar.gz" | head -n 1)
          [ -n "$TGZ" ] || TGZ="$BASE/macos/${APP_NAME}.tar.gz"
          rm -f "$TGZ"
          tar -C "$BASE/macos" -czf "$TGZ" "$APP_NAME"
          echo "Repackaged $(basename "$TGZ")"

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        working-directory: packages/desktop
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          BASE="src-tauri/target/$TARGET/release/bundle"
          DMG_DIR="$BASE/dmg"
          STAGE="$DMG_DIR/stage"

          case "$TARGET" in
            aarch64-apple-darwin) ARCH="aarch64" ;;
            x86_64-apple-darwin) ARCH="x64" ;;
            *) echo "Unsupported macOS target: $TARGET" >&2; exit 1 ;;
          esac

          APP_PATH=$(find "$BASE/macos" -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $BASE/macos" >&2
            exit 1
          fi

          mkdir -p "$DMG_DIR"
          rm -rf "$STAGE" "$DMG_DIR/OSCAR_${VERSION}_${ARCH}.dmg"
          mkdir -p "$STAGE"

          ditto "$APP_PATH" "$STAGE/OSCAR.app"
          ln -s /Applications "$STAGE/Applications"

          hdiutil create \
            -volname "OSCAR" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG_DIR/OSCAR_${VERSION}_${ARCH}.dmg"

          hdiutil verify "$DMG_DIR/OSCAR_${VERSION}_${ARCH}.dmg"
          rm -rf "$STAGE"

      # Hard gate against re-shipping a broken seal — the exact v0.7.32 failure
      # ("code has no resources but signature indicates they must be present"),
      # which macOS 15/26+ launches degraded. The seal MUST be valid, and MUST
      # survive the round-trip through the .app.tar.gz updater artifact (the
      # in-place-swap path that broke on the user's Mac). Works in both modes.
      - name: Verify macOS signature seal
        if: runner.os == 'macOS'
        working-directory: packages/desktop
        env:
          TARGET: ${{ matrix.target }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          BASE="src-tauri/target/$TARGET/release/bundle"
          APP=$(find "$BASE/macos" -maxdepth 1 -name "*.app" -type d | head -n 1)
          [ -n "$APP" ] || { echo "No .app bundle found" >&2; exit 1; }

          echo "── .app seal must be valid ──"
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "── updater artifact (.app.tar.gz) must preserve the seal ──"
          TGZ=$(find "$BASE/macos" -maxdepth 1 -name "*.app.tar.gz" | head -n 1)
          [ -n "$TGZ" ] || { echo "ERROR: no .app.tar.gz updater artifact" >&2; exit 1; }
          TMP=$(mktemp -d)
          tar -xzf "$TGZ" -C "$TMP"
          EXTRACTED=$(find "$TMP" -maxdepth 1 -name "*.app" -type d | head -n 1)
          [ -n "$EXTRACTED" ] || { echo "ERROR: no .app inside $TGZ" >&2; exit 1; }
          # This is the exact check that failed on the broken v0.7.32 install.
          codesign --verify --deep --strict --verbose=2 "$EXTRACTED"
          rm -rf "$TMP"

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "── Developer ID mode: assert authority ──"
            codesign -dvv "$APP" 2>&1 | grep -q "Authority=Developer ID Application" || {
              echo "ERROR: APPLE_SIGNING_IDENTITY is set but the .app is not Developer ID signed." >&2
              codesign -dvv "$APP" 2>&1 | grep -iE "Authority|Signature|flags" >&2 || true
              exit 1
            }
            spctl --assess --type exec -vvv "$APP" \
              || echo "::warning::Developer ID signed but Gatekeeper rejects — notarization (paid: xcrun notarytool + stapler) is still required for frictionless installs."
          else
            echo "── Ad-hoc mode (free): valid seal, not notarized ──"
            codesign -dvv "$APP" 2>&1 | grep -iE "Signature|flags" || true
            echo "::notice title=Ad-hoc macOS build::Valid ad-hoc seal — launches fully on macOS 15/26+. First DMG install needs a one-time Gatekeeper bypass (right-click Open / 'Open Anyway' / xattr -dr com.apple.quarantine); TCC grants reset each auto-update (ad-hoc cdhash churn). Add APPLE_* secrets for a stable Developer ID identity."
          fi

          echo "✓ macOS seal verified"

      - name: Sign bundles
        if: runner.os != 'Windows'
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TARGET: ${{ matrix.target }}
        run: |
          shopt -s nullglob
          TAURI_BIN="../../node_modules/.bin/tauri"

          for F in \
            src-tauri/target/$TARGET/release/bundle/macos/*.app.tar.gz \
            src-tauri/target/$TARGET/release/bundle/dmg/*.dmg \
            src-tauri/target/$TARGET/release/bundle/appimage/*.AppImage.tar.gz; do
            echo "Signing $(basename "$F")..."
            "$TAURI_BIN" signer sign "$F"
            echo "  $(basename "$F").sig created"
          done

          echo "All signed files:"
          find src-tauri/target/$TARGET/release/bundle -name "*.sig" | sort

      - name: Sign bundles (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $TAURI_BIN = "../../node_modules/.bin/tauri"
          $BASE = "src-tauri/target/$env:TARGET/release/bundle/nsis"

          # Tauri v2 does not always auto-generate the .nsis.zip updater artifact.
          # Create it manually from the .exe if it doesn't exist.
          Get-ChildItem "$BASE\*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $zipPath = $_.FullName -replace '\.exe$', '.nsis.zip'
            if (-not (Test-Path $zipPath)) {
              Write-Host "Creating updater zip: $(Split-Path $zipPath -Leaf)"
              Compress-Archive -Path $_.FullName -DestinationPath $zipPath -Force
            }
          }

          Get-ChildItem "$BASE\*.nsis.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Signing $($_.Name)..."
            & $TAURI_BIN signer sign $_.FullName
          }

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TARGET: ${{ matrix.target }}
          REPO: ${{ github.repository }}
          LABEL: ${{ matrix.label }}
        shell: bash
        run: |
          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"

          upload_file() {
            local FILE="$1"
            [ -f "$FILE" ] || return 0
            local NAME
            NAME=$(basename "$FILE")
            echo "Uploading $NAME..."
            curl -sL -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$FILE" \
              "$UPLOAD_URL?name=$NAME"
            echo ""
          }

          shopt -s nullglob
          BASE="packages/desktop/src-tauri/target/$TARGET/release/bundle"

          # ── macOS ──
          if [[ "$TARGET" == *apple-darwin* ]]; then
            ARCH="${TARGET//-apple-darwin/}"
            # Rename .app.tar.gz to include arch
            for F in "$BASE/macos/"*.app.tar.gz; do
              NEWNAME="${F%.app.tar.gz}_${ARCH}.app.tar.gz"
              mv "$F" "$NEWNAME"
              echo "Renamed to $(basename "$NEWNAME")"
            done
            for F in "$BASE/macos/"*.app.tar.gz.sig; do
              NEWNAME="${F%.app.tar.gz.sig}_${ARCH}.app.tar.gz.sig"
              mv "$F" "$NEWNAME"
            done
            for F in "$BASE"/macos/*_${ARCH}.app.tar.gz "$BASE"/macos/*_${ARCH}.app.tar.gz.sig; do upload_file "$F"; done
            for F in "$BASE"/dmg/*.dmg "$BASE"/dmg/*.dmg.sig; do upload_file "$F"; done
          fi

          # ── Windows ──
          if [[ "$TARGET" == *windows* ]]; then
            for F in "$BASE"/nsis/*.exe; do upload_file "$F"; done
            for F in "$BASE"/nsis/*.nsis.zip "$BASE"/nsis/*.nsis.zip.sig; do upload_file "$F"; done
          fi

          # ── Linux ──
          if [[ "$TARGET" == *linux* ]]; then
            for F in "$BASE"/appimage/*.AppImage; do upload_file "$F"; done
            for F in "$BASE"/appimage/*.AppImage.tar.gz "$BASE"/appimage/*.AppImage.tar.gz.sig; do upload_file "$F"; done
            for F in "$BASE"/deb/*.deb; do upload_file "$F"; done
          fi

  # After ALL builds, generate updates.json with real signatures for auto-updater
  updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate and upload updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ASSETS=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          get_url() {
            echo "$ASSETS" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if re.search(sys.argv[1], a['name']):
                  print(a['browser_download_url']); break
          " "$1"
          }

          get_sig() {
            URL=$(get_url "$1")
            [ -n "$URL" ] && curl -sL "$URL" || echo ""
          }

          # macOS updater artifacts (.app.tar.gz)
          ARM_URL=$(get_url "aarch64.*\.app\.tar\.gz$")
          X86_URL=$(get_url "x64.*\.app\.tar\.gz$|x86_64.*\.app\.tar\.gz$")
          ARM_SIG=$(get_sig "aarch64.*\.app\.tar\.gz\.sig$")
          X86_SIG=$(get_sig "x64.*\.app\.tar\.gz\.sig$|x86_64.*\.app\.tar\.gz\.sig$")

          # Windows updater artifact (.nsis.zip)
          WIN_URL=$(get_url "\.nsis\.zip$")
          WIN_SIG=$(get_sig "\.nsis\.zip\.sig$")

          # Linux updater artifact (.AppImage.tar.gz)
          LINUX_URL=$(get_url "\.AppImage\.tar\.gz$")
          LINUX_SIG=$(get_sig "\.AppImage\.tar\.gz\.sig$")

          echo "macOS ARM:  $ARM_URL"
          echo "macOS x86:  $X86_URL"
          echo "Windows:    $WIN_URL"
          echo "Linux:      $LINUX_URL"

          # Release notes: single source of truth is the GitHub release body
          # (generated by git-cliff, or hand-edited on GitHub). Passed via env so
          # arbitrary text/newlines can't break the inline Python below.
          NOTES=$(echo "$ASSETS" | python3 -c "import sys, json; print(json.load(sys.stdin).get('body') or 'Bug fixes and improvements.')")
          export NOTES
          echo "Notes:      $NOTES"

          python3 -c "
          import json, os
          platforms = {}
          if '$ARM_URL':
            platforms['darwin-aarch64'] = {'signature': r'''$ARM_SIG'''.strip(), 'url': '$ARM_URL'}
          if '$X86_URL':
            platforms['darwin-x86_64'] = {'signature': r'''$X86_SIG'''.strip(), 'url': '$X86_URL'}
          if '$WIN_URL':
            platforms['windows-x86_64'] = {'signature': r'''$WIN_SIG'''.strip(), 'url': '$WIN_URL'}
          if '$LINUX_URL':
            platforms['linux-x86_64'] = {'signature': r'''$LINUX_SIG'''.strip(), 'url': '$LINUX_URL'}
          print(json.dumps({
            'version': '$VERSION',
            'notes': os.environ.get('NOTES', 'Bug fixes and improvements.'),
            'pub_date': '$PUB_DATE',
            'platforms': platforms
          }, indent=2))
          " > updates.json

          cat updates.json

          # Delete old updates.json if exists
          OLD_ID=$(echo "$ASSETS" | python3 -c "
          import sys,json
          for a in json.load(sys.stdin).get('assets',[]):
              if a['name']=='updates.json': print(a['id']); break
          " 2>/dev/null || true)
          [ -n "$OLD_ID" ] && curl -sL -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/assets/$OLD_ID"

          # Upload fresh updates.json
          RELEASE_ID=$(echo "$ASSETS" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -sL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @updates.json \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=updates.json"
