name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-silicon
          - target: x86_64-apple-darwin
            label: macos-intel

    runs-on: macos-latest   # ARM M-series — aarch64 native, x86_64 cross-compiled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OSCAR ${{ github.ref_name }}'
          releaseBody: 'Bug fixes and improvements. Download the .dmg for your Mac below.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # After both builds finish, generate and upload updates.json with signatures
  updater:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate and upload updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ASSETS=$(curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          get_url() {
            echo "$ASSETS" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if re.search(sys.argv[1], a['name']):
                  print(a['browser_download_url']); break
          " "$1"
          }

          get_sig() {
            URL=$(get_url "$1")
            [ -n "$URL" ] && curl -sL "$URL" || echo ""
          }

          ARM_URL=$(get_url "aarch64.*\.dmg$")
          X86_URL=$(get_url "x86_64.*\.dmg$|_x64.*\.dmg$")
          ARM_SIG=$(get_sig "aarch64.*\.dmg\.sig$")
          X86_SIG=$(get_sig "x86_64.*\.dmg\.sig$|_x64.*\.dmg\.sig$")

          python3 -c "
          import json, sys
          print(json.dumps({
            'version': '$VERSION',
            'notes': 'Bug fixes and improvements.',
            'pub_date': '$PUB_DATE',
            'platforms': {
              'darwin-aarch64': {'signature': '''$ARM_SIG'''.strip(), 'url': '$ARM_URL'},
              'darwin-x86_64':  {'signature': '''$X86_SIG'''.strip(), 'url': '$X86_URL'},
            }
          }, indent=2))
          " > updates.json

          cat updates.json

          # Delete old updates.json asset if it exists
          OLD_ID=$(echo "$ASSETS" | python3 -c "
          import sys,json
          for a in json.load(sys.stdin).get('assets',[]):
              if a['name']=='updates.json': print(a['id']); break
          ")
          [ -n "$OLD_ID" ] && curl -sL -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/assets/$OLD_ID"

          # Upload fresh updates.json
          UPLOAD_URL=$(echo "$ASSETS" | python3 -c "
          import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

          curl -sL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @updates.json \
            "${UPLOAD_URL}?name=updates.json"
