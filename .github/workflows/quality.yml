name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format regressions
        run: pnpm test:format-regressions

      - name: Typecheck shared
        run: pnpm --filter @oscar/shared typecheck

      - name: Typecheck web
        run: pnpm --filter @oscar/web exec tsc --noEmit

      - name: Typecheck desktop
        run: pnpm --filter @oscar/desktop exec tsc --noEmit
